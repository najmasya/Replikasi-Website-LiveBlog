<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Blog Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #eef1f7;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: #fff;
    border-bottom: 1px solid #e0e4ee;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .hero-left h1 {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .hero-left p {
    font-size: 13px;
    color: #6b7280;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    color: #16a34a;
  }

  .live-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50%       { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 24px 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .stat-card {
    background: #fff;
    border: 1px solid #e0e4ee;
    border-radius: 12px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .stat-label {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1;
  }

  .stat-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .stat-icon.blue   { background: #eff6ff; }
  .stat-icon.green  { background: #f0fdf4; }
  .stat-icon.purple { background: #f5f3ff; }

  /* ── MAIN ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px 40px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .refresh-btn {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #fff;
    cursor: pointer;
    color: #374151;
    font-family: inherit;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: #f3f4f6; }

  /* ── BLOG GRID ── */
  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px) { .blog-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 580px) { .blog-grid { grid-template-columns: 1fr; } }

  /* ── BLOG CARD ── */
  .blog-card {
    background: #fff;
    border: 1px solid #e0e4ee;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: up 0.25s ease both;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .blog-card:nth-child(2) { animation-delay: .05s }
  .blog-card:nth-child(3) { animation-delay: .10s }
  .blog-card:nth-child(4) { animation-delay: .15s }
  .blog-card:nth-child(5) { animation-delay: .20s }
  .blog-card:nth-child(6) { animation-delay: .25s }

  .card-banner {
    height: 72px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    padding: 16px;
    display: flex;
    align-items: flex-end;
  }

  /* warna banner bergantian */
  .blog-card:nth-child(3n+1) .card-banner { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .blog-card:nth-child(3n+2) .card-banner { background: linear-gradient(135deg, #2563eb, #60a5fa); }
  .blog-card:nth-child(3n+3) .card-banner { background: linear-gradient(135deg, #0891b2, #22d3ee); }

  .card-judul {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    word-break: break-word;
  }

  .card-body {
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-isi {
    font-size: 13px;
    color: #374151;
    line-height: 1.65;
    /* potong teks panjang */
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid #f3f4f6;
    margin-top: auto;
  }

  .author-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #e0e7ff;
    color: #4f46e5;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .author-name  { font-size: 12px; font-weight: 600; color: #1a1a2e; }
  .author-nim   { font-size: 11px; color: #9ca3af; }

  .kelas-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: #f3f4f6;
    color: #6b7280;
    font-weight: 500;
  }

  .card-time {
    font-size: 11px;
    color: #9ca3af;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── EMPTY STATE ── */
  .empty-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 900px) { .empty-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 580px) { .empty-grid { grid-template-columns: 1fr; } }

  .empty-card {
    background: #fff;
    border: 1px dashed #d1d5db;
    border-radius: 12px;
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #d1d5db;
  }

  .empty-card .empty-icon { font-size: 28px; }
  .empty-card .empty-label { font-size: 12px; color: #9ca3af; }

  /* hanya 1 card dengan pesan, sisanya placeholder */
  .empty-card.main-empty {
    border-color: #93c5fd;
    background: #eff6ff;
    color: #3b82f6;
  }
  .empty-card.main-empty .empty-label { color: #3b82f6; font-weight: 500; }

  .swagger-link {
    font-size: 12px;
    color: #2563eb;
    text-decoration: none;
    margin-top: 4px;
    display: inline-block;
  }
  .swagger-link:hover { text-decoration: underline; }

  /* ── SERVER ERROR ── */
  .server-err {
    background: #fff;
    border: 1px solid #fca5a5;
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    color: #dc2626;
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-left">
    <h1>📝 Live Blog Feed</h1>
    <p>Modul Praktikum Mahasiswa — Real-time Updates</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div>
      <div class="stat-label">Total Blogs</div>
      <div class="stat-value" id="stat-blogs">—</div>
    </div>
    <div class="stat-icon blue">📄</div>
  </div>
  <div class="stat-card">
    <div>
      <div class="stat-label">Active Authors</div>
      <div class="stat-value" id="stat-authors">—</div>
    </div>
    <div class="stat-icon green">👥</div>
  </div>
  <div class="stat-card">
    <div>
      <div class="stat-label">Last Update</div>
      <div class="stat-value" id="stat-time" style="font-size:20px;padding-top:6px">—</div>
    </div>
    <div class="stat-icon purple">🕐</div>
  </div>
</div>

<!-- BLOG GRID -->
<div class="main">
  <div class="section-header">
    <div class="section-title">Blog Terbaru</div>
    <button class="refresh-btn" onclick="loadBlogs()">↺ Refresh</button>
  </div>
  <div id="blog-container">
    <!-- diisi JS -->
  </div>
</div>

<script>
const BASE = 'http://localhost:8000';

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (diff < 60)     return diff + ' detik lalu';
  if (diff < 3600)   return Math.floor(diff/60) + ' menit lalu';
  if (diff < 86400)  return Math.floor(diff/3600) + ' jam lalu';
  return Math.floor(diff/86400) + ' hari lalu';
}

function nowTime() {
  return new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function renderEmpty() {
  document.getElementById('stat-blogs').textContent   = '0';
  document.getElementById('stat-authors').textContent = '0';
  document.getElementById('stat-time').textContent    = nowTime();

  // tampilkan grid kosong: 1 card info + 5 placeholder
  const cards = [
    `<div class="empty-card main-empty">
      <div class="empty-icon">📭</div>
      <div class="empty-label">Belum ada blog</div>
      <a class="swagger-link" href="${BASE}/docs" target="_blank">Buat blog via Swagger UI →</a>
    </div>`,
    ...Array(5).fill(`<div class="empty-card"><div class="empty-icon">＋</div><div class="empty-label">Kosong</div></div>`)
  ].join('');

  document.getElementById('blog-container').innerHTML =
    `<div class="empty-grid">${cards}</div>`;
}

function renderBlogs(blogs) {
  const uniqueAuthors = new Set(blogs.map(b => b.author_nim)).size;
  document.getElementById('stat-blogs').textContent   = blogs.length;
  document.getElementById('stat-authors').textContent = uniqueAuthors;
  document.getElementById('stat-time').textContent    = nowTime();

  const cards = blogs.map(b => {
    const initial = (b.author_nama || '?')[0].toUpperCase();
    const edited  = b.updated_at && b.updated_at !== b.created_at
      ? `<div class="card-time">✏️ ${timeAgo(b.updated_at)}</div>`
      : '';
    return `
      <div class="blog-card">
        <div class="card-banner">
          <div class="card-judul">${b.judul}</div>
        </div>
        <div class="card-body">
          <div class="card-isi">${b.isi}</div>
          <div class="card-footer">
            <div class="author-info">
              <div class="avatar">${initial}</div>
              <div>
                <div class="author-name">${b.author_nama}</div>
                <div class="author-nim">NIM: ${b.author_nim}</div>
              </div>
            </div>
            <span class="kelas-badge">${b.author_kelas}</span>
          </div>
          <div class="card-time">📅 ${timeAgo(b.created_at)}</div>
          ${edited}
        </div>
      </div>`;
  }).join('');

  document.getElementById('blog-container').innerHTML =
    `<div class="blog-grid">${cards}</div>`;
}

async function loadBlogs() {
  try {
    const r = await fetch(BASE + '/api/blogs');
    if (!r.ok) throw new Error();
    const blogs = await r.json();
    blogs.length ? renderBlogs(blogs) : renderEmpty();
  } catch {
    document.getElementById('stat-blogs').textContent   = '—';
    document.getElementById('stat-authors').textContent = '—';
    document.getElementById('stat-time').textContent    = '—';
    document.getElementById('blog-container').innerHTML =
      `<div class="server-err">
        ⚠️ Tidak bisa terhubung ke server.<br>
        Pastikan API berjalan di <b>localhost:8000</b>.
      </div>`;
  }
}

loadBlogs();
setInterval(loadBlogs, 10000);
</script>
</body>
</html>
